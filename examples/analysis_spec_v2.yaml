version: 2

validation:
  mode: strict

metadata:
  logical_scenario_name: cutin-opt

parameters:
  mode: all_pairwise
  include: [Relative_Distance, Ego_Speed, Agent_Speed, Relative_Speed]
  units:
    Relative_Distance: m
    Ego_Speed: m/s
    Agent_Speed: m/s
    Relative_Speed: m/s
  labels:
    Relative_Distance: Initial relative distance
    Ego_Speed: Initial ego speed
    Agent_Speed: Initial cut-in vehicle speed
    Relative_Speed: Initial relative speed
  derived:
    Relative_Speed:
      operation: subtract
      left: Ego_Speed
      right: Agent_Speed
      label: Initial relative speed
      unit: m/s

metrics:
  min_ttc:
    summary: ego_to_agent_1.min_ttc_s
    series: ego_to_agent_1.ttc_s
    label: Minimum TTC
    unit: s
    missing: unavailable
    risk_direction: higher_is_safer
  min_distance:
    summary: ego_to_agent_1_distance.min
    series: ego_to_agent_1.distance_m
    label: Minimum ego-agent center distance
    unit: m
    missing: unavailable
    risk_direction: higher_is_safer
  max_deceleration:
    summary: ego_deceleration.max
    series: ego.acceleration
    label: Maximum ego deceleration
    unit: m/s^2
    risk_direction: lower_is_safer

outcomes:
  success: [success]
  failure: [fail, failure, failed, test_fail]
  invalid: [invalid]
  collision_reasons: [collision, collision_guard]
  termination:
    collision_guard: failure
    ego_reaches_goal: success
    av_should_quit: unclassified

thresholds:
  near_critical_ttc_s: 2.0

comparison:
  pairing: sample_id_then_parameters
  parameter_tolerance: 1.0e-9
  bootstrap_samples: 2000
  bootstrap_seed: 0

heatmap:
  bins: 30
  min_bin_count: 1

sensitivity:
  enabled: true
  targets:
    outcomes: [failure, invalidity]
    metrics: [min_ttc, min_distance, max_deceleration]
  bins: 8
  minimum_bin_count: 8
  minimum_samples: 40
  minimum_minority: 10
  cv_folds: 5
  permutation_repeats: 10
  bootstrap_samples: 500
  top_parameters: 8
  random_seed: 0
  sampling_plan:
    sobol_base_sizes: [256, 512, 1024]
    morris_trajectories: [10, 20, 40]

output:
  formats: [svg, png]
